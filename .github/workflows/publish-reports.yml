name: Publish Cypress Reports to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-upload:
    name: Run tests and upload reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run CI tests (generate reports)
        run: npm run test:ci

      - name: Upload reports as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports-html
          path: cypress/reports/html

  deploy:
    name: Deploy to GitHub Pages (gh-pages branch)
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports/html
