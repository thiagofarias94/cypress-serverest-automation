name: Cypress ServeRest E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        id: cypress
        continue-on-error: true
        run: npm run test:ci

      - name: Publish JUnit results to Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Cypress JUnit Results
          path: cypress/reports/junit/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Cypress reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: |
            cypress/reports/
            cypress/screenshots/
            cypress/videos/

      - name: Publish HTML report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports/html
          destination_dir: reports/${{ github.run_number }}
          keep_files: true
          force_orphan: false

      - name: Comment PR with report link
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runNumber = context.runNumber;
            const reportUrl = `https://${owner}.github.io/${repo}/reports/${runNumber}/index.html`;
            const body = `## Cypress report\n\n- HTML report: [Open report](${reportUrl})`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail job if Cypress tests failed
        if: always()
        run: |
          if [ "${{ steps.cypress.outcome }}" = "failure" ] || [ "${{ steps.cypress.outcome }}" = "successWithIssues" ]; then
            echo "Cypress tests failed or had issues."
            exit 1
          fi
